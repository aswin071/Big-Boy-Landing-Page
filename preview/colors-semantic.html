<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F9F8F4; padding: 20px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; }
.swatch { flex: 1; border-radius: 8px; overflow: hidden; }
.color { height: 48px; display: flex; align-items: center; justify-content: center; }
.icon { font-size: 18px; }
.label { padding: 6px 8px; background: white; border: 1px solid #E8E6DF; border-top: none; border-radius: 0 0 8px 8px; text-align: center; }
.label .name { font-size: 10px; font-weight: 600; color: #1A1A1A; }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #C0392B; margin-bottom: 8px; }
</style>
</head><body>
<div class="section-title">Tracker Card Colors</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#5B7FE8"><span class="icon">🌙</span></div><div class="label"><div class="name">Sleep</div></div></div>
  <div class="swatch"><div class="color" style="background:#F0A928"><span class="icon">⚡</span></div><div class="label"><div class="name">Energy</div></div></div>
  <div class="swatch"><div class="color" style="background:#9B59B6"><span class="icon">🧠</span></div><div class="label"><div class="name">Stress</div></div></div>
  <div class="swatch"><div class="color" style="background:#E84C8A"><span class="icon">❤️</span></div><div class="label"><div class="name">Libido</div></div></div>
  <div class="swatch"><div class="color" style="background:#2BB5D8"><span class="icon">💧</span></div><div class="label"><div class="name">Water</div></div></div>
  <div class="swatch"><div class="color" style="background:#6C7A89"><span class="icon">🍷</span></div><div class="label"><div class="name">Alcohol</div></div></div>
</div>
<div class="section-title">Score Pillars</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#C0392B"></div><div class="label"><div class="name">Physical</div></div></div>
  <div class="swatch"><div class="color" style="background:#9B59B6"></div><div class="label"><div class="name">Mental</div></div></div>
  <div class="swatch"><div class="color" style="background:#E8A028"></div><div class="label"><div class="name">Hormonal</div></div></div>
  <div class="swatch"><div class="color" style="background:#27AE60"></div><div class="label"><div class="name">Nutrition</div></div></div>
  <div class="swatch"><div class="color" style="background:#2BB5D8"></div><div class="label"><div class="name">Habits</div></div></div>
</div>
</body></html>
