<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F9F8F4; padding: 20px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; }
.swatch { flex: 1; border-radius: 8px; overflow: hidden; }
.color { height: 56px; }
.label { padding: 6px 10px; background: white; border: 1px solid #E8E6DF; border-top: none; border-radius: 0 0 8px 8px; }
.label .name { font-size: 11px; font-weight: 600; color: #1A1A1A; }
.label .hex { font-size: 10px; color: #999; font-family: monospace; }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #C0392B; margin-bottom: 8px; margin-top: 4px; }
</style>
</head><body>
<div class="section-title">Primary</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#E8554A"></div><div class="label"><div class="name">Primary Light</div><div class="hex">#E8554A</div></div></div>
  <div class="swatch"><div class="color" style="background:#C0392B"></div><div class="label"><div class="name">Primary</div><div class="hex">#C0392B</div></div></div>
  <div class="swatch"><div class="color" style="background:#96281B"></div><div class="label"><div class="name">Primary Dark</div><div class="hex">#96281B</div></div></div>
  <div class="swatch"><div class="color" style="background:rgba(192,57,43,0.1); border: 1px solid #E8E6DF;"></div><div class="label"><div class="name">Primary Muted</div><div class="hex">rgba(C0392B,10%)</div></div></div>
</div>
<div class="section-title">Gold</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#E4C97E"></div><div class="label"><div class="name">Gold Light</div><div class="hex">#E4C97E</div></div></div>
  <div class="swatch"><div class="color" style="background:#C8A84B"></div><div class="label"><div class="name">Gold</div><div class="hex">#C8A84B</div></div></div>
  <div class="swatch"><div class="color" style="background:#9A7D2F"></div><div class="label"><div class="name">Gold Dark</div><div class="hex">#9A7D2F</div></div></div>
</div>
</body></html>
