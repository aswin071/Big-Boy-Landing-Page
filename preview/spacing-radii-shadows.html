<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F9F8F4; padding: 20px; }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #C0392B; margin-bottom: 12px; }
.row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.radius-box { background: white; border: 1px solid #E8E6DF; width: 70px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.r-label { font-size: 10px; color: #999; font-family: monospace; margin-top: 4px; }
.shadow-box { background: white; border: 1px solid #F0EEE8; border-radius: 12px; padding: 10px 16px; font-size: 11px; color: #666; min-width: 100px; text-align: center; }
.shadow-name { font-weight: 600; color: #1A1A1A; font-size: 11px; margin-bottom: 2px; }
</style>
</head><body>
<div class="section-title">Border Radius</div>
<div class="row">
  <div><div class="radius-box" style="border-radius:4px"></div><div class="r-label">xs / 4px</div></div>
  <div><div class="radius-box" style="border-radius:8px"></div><div class="r-label">sm / 8px</div></div>
  <div><div class="radius-box" style="border-radius:12px"></div><div class="r-label">md / 12px</div></div>
  <div><div class="radius-box" style="border-radius:16px"></div><div class="r-label">lg / 16px</div></div>
  <div><div class="radius-box" style="border-radius:24px"></div><div class="r-label">xl / 24px</div></div>
  <div><div class="radius-box" style="border-radius:9999px"></div><div class="r-label">pill</div></div>
</div>
<div class="section-title">Elevation / Shadow</div>
<div class="row">
  <div class="shadow-box" style="box-shadow:none;"><div class="shadow-name">Level 0</div>none</div>
  <div class="shadow-box" style="box-shadow:0 1px 4px rgba(0,0,0,0.06)"><div class="shadow-name">Level 1</div>subtle</div>
  <div class="shadow-box" style="box-shadow:0 2px 12px rgba(0,0,0,0.08)"><div class="shadow-name">Level 2</div>card default</div>
  <div class="shadow-box" style="box-shadow:0 8px 32px rgba(0,0,0,0.12)"><div class="shadow-name">Level 3</div>card hover</div>
  <div class="shadow-box" style="box-shadow:0 24px 64px rgba(0,0,0,0.18)"><div class="shadow-name">Level 4</div>modal/phone</div>
  <div class="shadow-box" style="box-shadow:0 4px 24px rgba(192,57,43,0.30)"><div class="shadow-name">Red Glow</div>CTA button</div>
  <div class="shadow-box" style="box-shadow:0 4px 24px rgba(200,168,75,0.25)"><div class="shadow-name">Gold Glow</div>gold accents</div>
</div>
</body></html>
