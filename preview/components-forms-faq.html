<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F9F8F4; padding: 24px; }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #C0392B; margin-bottom: 12px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 600; color: #1A1A1A; margin-bottom: 6px; letter-spacing: 0.02em; }
input[type="email"], input[type="text"] {
  width: 100%; padding: 13px 16px; background: white; border: 1.5px solid #E8E6DF;
  border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #1A1A1A;
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: #C0392B; box-shadow: 0 0 0 3px rgba(192,57,43,0.08); }
input::placeholder { color: #BBBBBB; }
.input-row { display: flex; gap: 10px; }
.input-row input { flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; border-radius: 10px; padding: 13px 24px; cursor: pointer; border: none; background: #C0392B; color: white; white-space: nowrap; }
.privacy-note { font-size: 12px; color: #999; margin-top: 8px; }
.privacy-note span { color: #27AE60; font-weight: 500; }
.faq-item { background: white; border: 1px solid #E8E6DF; border-radius: 12px; padding: 16px 20px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.faq-q { font-size: 14px; font-weight: 600; color: #1A1A1A; }
.faq-icon { color: #999; font-size: 18px; }
</style>
</head><body>
<div class="section-title">Waitlist Form</div>
<div class="form-group">
  <label>Email address</label>
  <div class="input-row">
    <input type="email" placeholder="your@email.com">
    <button class="btn">Join Waitlist</button>
  </div>
  <div class="privacy-note">🔒 <span>No spam. No sharing. 100% private.</span></div>
</div>

<div class="section-title" style="margin-top:20px">FAQ Accordion</div>
<div class="faq-item">
  <div class="faq-q">Is this app private?</div>
  <div class="faq-icon">+</div>
</div>
<div class="faq-item" style="border-color:#C0392B">
  <div>
    <div class="faq-q">How is this different from ChatGPT?</div>
    <div style="font-size:13px;color:#666;margin-top:6px;line-height:1.6">The AI coach reads your actual data — score, sleep, stress, and program progress — before every reply. It's never generic.</div>
  </div>
  <div class="faq-icon" style="color:#C0392B">×</div>
</div>
<div class="faq-item">
  <div class="faq-q">Do Kegel exercises actually work?</div>
  <div class="faq-icon">+</div>
</div>
</body></html>
