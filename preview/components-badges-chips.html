<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F9F8F4; padding: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #C0392B; margin-bottom: 10px; width: 100%; }
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; border-radius: 9999px; padding: 4px 10px; }
.badge-red { background: rgba(192,57,43,0.12); color: #C0392B; }
.badge-blue { background: rgba(91,127,232,0.12); color: #5B7FE8; }
.badge-purple { background: rgba(155,89,182,0.12); color: #9B59B6; }
.badge-amber { background: rgba(232,160,40,0.12); color: #B87A00; }
.badge-green { background: rgba(39,174,96,0.12); color: #27AE60; }
.badge-dark { background: #1A1A1A; color: white; }

.program-card { background: white; border: 1px solid #E8E6DF; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); width: 180px; }
.program-title { font-size: 15px; font-weight: 700; color: #1A1A1A; margin: 10px 0 4px; line-height: 1.3; }
.program-desc { font-size: 12px; color: #666; line-height: 1.5; }
.program-progress { display: flex; gap: 2px; margin-top: 12px; }
.prog-dot { flex: 1; height: 4px; border-radius: 9999px; background: #F0EEE8; }
.prog-dot.filled { background: #C0392B; }

.chip { display: inline-flex; align-items: center; font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 9999px; background: white; border: 1px solid #E8E6DF; color: #1A1A1A; cursor: pointer; transition: all 0.2s; }
.chip:hover { border-color: #C0392B; color: #C0392B; }
.chip-active { background: #C0392B; color: white; border-color: #C0392B; }
</style>
</head><body>

<div style="width:100%">
<div class="section-title">Badges / Tags</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
  <span class="badge badge-red">30 Days</span>
  <span class="badge badge-blue">7 Days</span>
  <span class="badge badge-purple">7 Days</span>
  <span class="badge badge-amber">7 Days</span>
  <span class="badge badge-green">✓ Complete</span>
  <span class="badge badge-dark">🔥 21 day streak</span>
</div>
</div>

<div>
<div class="section-title">Program Cards</div>
<div style="display:flex;gap:12px;flex-wrap:wrap">
  <div class="program-card">
    <span class="badge badge-red">30 Days</span>
    <div class="program-title">Performance Reset</div>
    <div class="program-desc">The complete system</div>
    <div class="program-progress">
      <div class="prog-dot filled"></div><div class="prog-dot filled"></div><div class="prog-dot filled"></div>
      <div class="prog-dot filled"></div><div class="prog-dot filled"></div><div class="prog-dot filled"></div>
      <div class="prog-dot filled"></div><div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
    </div>
  </div>
  <div class="program-card">
    <span class="badge badge-blue">7 Days</span>
    <div class="program-title">Sleep Fix</div>
    <div class="program-desc">Fix your hormonal recovery</div>
    <div class="program-progress">
      <div class="prog-dot filled" style="background:#5B7FE8"></div><div class="prog-dot filled" style="background:#5B7FE8"></div><div class="prog-dot filled" style="background:#5B7FE8"></div>
      <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
    </div>
  </div>
</div>
</div>

<div>
<div class="section-title">Question Chips (AI Coach)</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
  <span class="chip chip-active">Why is my score low?</span>
  <span class="chip">How do Kegels help?</span>
  <span class="chip">Is stress affecting my libido?</span>
  <span class="chip">What should I focus on?</span>
</div>
</div>

</body></html>
