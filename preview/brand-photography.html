<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #111; padding: 0; }
.img-row { display: flex; gap: 0; height: 200px; }
.img-panel { flex: 1; overflow: hidden; position: relative; }
img { width: 100%; height: 100%; object-fit: cover; display: block; }
.overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); }
.tag { font-size: 11px; color: rgba(255,255,255,0.7); }
.tag b { color: white; font-weight: 600; }
</style>
</head><body>
<div class="img-row">
  <div class="img-panel">
    <img src="../assets/lifestyle-red-1.jpg" alt="Lifestyle red 1">
    <div class="overlay"><div class="tag"><b>Lifestyle Hero</b> — warm red, motion streaks</div></div>
  </div>
  <div class="img-panel">
    <img src="../assets/lifestyle-red-2.jpg" alt="Lifestyle red 2">
    <div class="overlay"><div class="tag"><b>Lifestyle Variant</b> — same scene, slight crop</div></div>
  </div>
</div>
</body></html>
