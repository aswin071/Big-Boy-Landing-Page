<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F9F8F4; padding: 0; display: flex; gap: 0; flex-direction: column; }
.logo-row { display: flex; gap: 0; }
.logo-panel { flex: 1; padding: 24px; display: flex; align-items: center; justify-content: center; }
img { max-width: 100%; height: auto; object-fit: contain; }
.label-row { display: flex; gap: 0; border-top: 1px solid #E8E6DF; }
.label-cell { flex: 1; padding: 8px 16px; font-size: 11px; color: #999; border-right: 1px solid #E8E6DF; }
.label-cell:last-child { border-right: none; }
.label-cell b { display: block; font-size: 11px; font-weight: 600; color: #1A1A1A; margin-bottom: 2px; }
</style>
</head><body>
<div class="logo-row">
  <div class="logo-panel" style="background:#F9F8F4">
    <img src="../assets/logo-light.jpg" alt="BIGBOY logo on light" style="max-height:80px">
  </div>
  <div class="logo-panel" style="background:#111111">
    <img src="../assets/logo-dark.jpg" alt="BIGBOY logo on dark" style="max-height:80px">
  </div>
  <div class="logo-panel" style="background:#1A1A1A">
    <img src="../assets/logo-carbon-1.jpg" alt="BIGBOY carbon banner" style="max-height:80px">
  </div>
</div>
<div class="label-row">
  <div class="label-cell"><b>Light Background</b>Gold 3D on cream — primary usage</div>
  <div class="label-cell"><b>Dark Background</b>Gold 3D on black — dark section usage</div>
  <div class="label-cell"><b>Carbon Banner</b>White on carbon+red — banner usage</div>
</div>
</body></html>
